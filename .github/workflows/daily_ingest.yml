name: Daily Data Ingestion

on:
  schedule:
    # Run daily at 9:00 AM IST (3:30 AM UTC)
    - cron: '30 3 * * *'
  workflow_dispatch:
    # Allow manual trigger for testing

jobs:
  scrape-and-ingest:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        
    - name: Install Playwright browsers
      run: |
        playwright install chromium
        
    - name: Run scraper
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      run: |
        echo "Starting data scraping..."
        python src/scraper.py
        echo "Scraping completed."
        
    - name: Run ingestion to Pinecone
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      run: |
        echo "Starting data ingestion to Pinecone..."
        python src/ingest.py
        echo "Ingestion completed."
        
    - name: Verify data files
      run: |
        echo "Verifying scraped data files..."
        ls -la data/
        echo "Data files count: $(ls data/*.json 2>/dev/null | wc -l)"
        
    - name: Commit updated data files (optional)
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "GitHub Actions Bot"
        git add data/
        git diff --staged --quiet || git commit -m "Update fund data - $(date +%Y-%m-%d)"
        git push || echo "No changes to commit"
      continue-on-error: true
